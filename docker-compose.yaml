version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agent_interface_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dpg_agent_interface
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DPG_DATABASE_URL: ${DPG_DATABASE_URL}
      DPG_INSTANCE_URL: ${DPG_INSTANCE_URL}
      SCHEMA_BASE_URL: ${SCHEMA_BASE_URL}
      APP_HOST: 0.0.0.0
      APP_PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${APP_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: